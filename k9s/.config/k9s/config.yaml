k9s:
  liveViewAutoRefresh: true
  screenDumpDir: /tmp/k9s/screen-dumps
  refreshRate: 2
  maxConnRetry: 5
  readOnly: false
  noExitOnCtrlC: false
  ui:
    enableMouse: false
    headless: false
    logoless: false
    crumbsless: false
    noIcons: false
    reactive: true
    skin: catppuccin-frappe-transparent
  skipLatestRevCheck: false
  disablePodCounting: false
  shellPod:
    image: busybox:stable
    namespace: kube-system
    limits:
      cpu: 100m
      memory: 100Mi
    tty: true
  imageScans:
    enable: false
    exclusions:
      namespaces: []
      labels: {}
  logger:
    tail: 1000
    buffer: 5000
    sinceSeconds: -1
    textWrap: true
    showTime: false
    fullScreen: true
  thresholds:
    cpu:
      critical: 90
      warn: 80
    memory:
      critical: 90
      warn: 80
